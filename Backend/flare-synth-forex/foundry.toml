[profile.default]
src           = "src"
out           = "out"
libs          = ["lib", "node_modules"]
evm_version   = "cancun"
solc_version  = "0.8.28"
auto_detect_solc = true
optimizer     = true
optimizer_runs = 200
via_ir        = false

[fuzz]
runs = 1000
max_test_rejects = 65536
seed = "0x1234"

[invariant]
runs   = 256
depth  = 32
fail_on_revert = true

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options

[rpc_endpoints]
coston2 = "${COSTON2_RPC_URL}"

[etherscan]
coston2 = { key = "${ETHERSCAN_KEY}", url = "https://api.routescan.io/v2/network/testnet/evm/114/etherscan" }
